name: 发布 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号 (如 1.0.0)
        required: true
        type: string
        default: "1.0.0"
      release_notes:
        description: 发布说明
        required: false
        type: string
        default: "新版本发布"
      linux_amd64:
        description: 构建 Linux amd64
        required: false
        type: boolean
        default: true
      linux_arm64:
        description: 构建 Linux arm64
        required: false
        type: boolean
        default: false
      linux_armv7:
        description: 构建 Linux armv7
        required: false
        type: boolean
        default: false
      darwin_amd64:
        description: 构建 Darwin amd64
        required: false
        type: boolean
        default: false
      darwin_arm64:
        description: 构建 Darwin arm64
        required: false
        type: boolean
        default: false
      windows_amd64:
        description: 构建 Windows amd64
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: 构建 Linux amd64
    if: ${{ github.event.inputs.linux_amd64 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: 安装依赖
        run: go mod download && go mod tidy
      - name: 构建
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-tool-linux-amd64 ./cmd/cli
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-server-linux-amd64 ./cmd/server
          tar -czf lottery-tool-linux-amd64-${{ github.event.inputs.version }}.tar.gz lottery-tool-linux-amd64 lottery-server-linux-amd64 config/config.yaml
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: lottery-tool-linux-amd64-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: 构建 Linux arm64
    if: ${{ github.event.inputs.linux_arm64 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: 安装依赖
        run: go mod download && go mod tidy
      - name: 构建
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-tool-linux-arm64 ./cmd/cli
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-server-linux-arm64 ./cmd/server
          tar -czf lottery-tool-linux-arm64-${{ github.event.inputs.version }}.tar.gz lottery-tool-linux-arm64 lottery-server-linux-arm64 config/config.yaml
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: lottery-tool-linux-arm64-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-armv7:
    name: 构建 Linux armv7
    if: ${{ github.event.inputs.linux_armv7 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 ARM 交叉编译工具
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: 安装依赖
        run: go mod download && go mod tidy
      - name: 构建
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm GOARM=7 CC=arm-linux-gnueabihf-gcc go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-tool-linux-armv7 ./cmd/cli
          CGO_ENABLED=1 GOOS=linux GOARCH=arm GOARM=7 CC=arm-linux-gnueabihf-gcc go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-server-linux-armv7 ./cmd/server
          tar -czf lottery-tool-linux-armv7-${{ github.event.inputs.version }}.tar.gz lottery-tool-linux-armv7 lottery-server-linux-armv7 config/config.yaml
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: lottery-tool-linux-armv7-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-darwin-amd64:
    name: 构建 Darwin amd64
    if: ${{ github.event.inputs.darwin_amd64 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: 安装依赖
        run: go mod download && go mod tidy
      - name: 构建
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-tool-darwin-amd64 ./cmd/cli
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-server-darwin-amd64 ./cmd/server
          tar -czf lottery-tool-darwin-amd64-${{ github.event.inputs.version }}.tar.gz lottery-tool-darwin-amd64 lottery-server-darwin-amd64 config/config.yaml
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: lottery-tool-darwin-amd64-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-darwin-arm64:
    name: 构建 Darwin arm64
    if: ${{ github.event.inputs.darwin_arm64 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: 安装依赖
        run: go mod download && go mod tidy
      - name: 构建
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-tool-darwin-arm64 ./cmd/cli
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-server-darwin-arm64 ./cmd/server
          tar -czf lottery-tool-darwin-arm64-${{ github.event.inputs.version }}.tar.gz lottery-tool-darwin-arm64 lottery-server-darwin-arm64 config/config.yaml
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: lottery-tool-darwin-arm64-${{ github.event.inputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-amd64:
    name: 构建 Windows amd64
    if: ${{ github.event.inputs.windows_amd64 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 Windows 交叉编译工具
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 zip
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: 安装依赖
        run: go mod download && go mod tidy
      - name: 构建
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-tool-windows-amd64.exe ./cmd/cli
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o lottery-server-windows-amd64.exe ./cmd/server
          zip lottery-tool-windows-amd64-${{ github.event.inputs.version }}.zip lottery-tool-windows-amd64.exe lottery-server-windows-amd64.exe config/config.yaml
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: lottery-tool-windows-amd64-${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
