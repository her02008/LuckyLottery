name: Docker 构建

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号 (如 v1.0.0)
        required: true
        type: string
        default: "v1.0.0"
      push:
        description: 推送到 Docker Hub
        required: false
        type: boolean
        default: false

jobs:
  docker:
    name: 构建多平台 Docker 镜像
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        if: ${{ github.event.inputs.push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event.inputs.push == 'true' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/lottery-tool:${{ github.event.inputs.version }},${{ secrets.DOCKER_USERNAME }}/lottery-tool:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 导出镜像
        if: ${{ github.event.inputs.push == 'false' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: false
          outputs: type=tar,dest=lottery-tool-docker-images.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 上传镜像包
        if: ${{ github.event.inputs.push == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: lottery-tool-docker-images.tar
          retention-days: 7