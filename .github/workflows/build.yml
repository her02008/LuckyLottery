name: 构建

on:
  workflow_dispatch:
    inputs:
      version:
        description: 版本号
        required: true
        type: string
        default: "1.0.0"
      build_binaries:
        description: 构建二进制文件
        required: false
        type: boolean
        default: true
      build_docker:
        description: 构建Docker镜像
        required: false
        type: boolean
        default: false

jobs:
  build-binaries:
    name: 构建二进制文件
    if: ${{ github.event.inputs.build_binaries == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            suffix: linux-armv7
          - goos: linux
            goarch: arm
            goarm: 6
            suffix: linux-armv6
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 安装依赖
        run: |
          go mod download
          go mod tidy

      - name: 构建 CLI
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          OUTPUT="lottery-tool-${{ matrix.suffix }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o ${OUTPUT} ./cmd/cli
          echo "CLI_OUTPUT=${OUTPUT}" >> $GITHUB_ENV

      - name: 构建 Server
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          OUTPUT="lottery-server-${{ matrix.suffix }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" -o ${OUTPUT} ./cmd/server
          echo "SERVER_OUTPUT=${OUTPUT}" >> $GITHUB_ENV

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            lottery-tool-${{ matrix.suffix }}${{ matrix.goos == 'windows' && '.exe' || '' }}
            lottery-server-${{ matrix.suffix }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          retention-days: 30

  build-docker:
    name: 构建 Docker 镜像
    if: ${{ github.event.inputs.build_docker == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lottery-tool:${{ github.event.inputs.version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || matrix.platform == 'linux/arm64' && 'arm64' || 'armv7' }},${{ secrets.DOCKER_USERNAME }}/lottery-tool:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max